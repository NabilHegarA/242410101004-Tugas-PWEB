<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - HookPoint</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            <span class="menu-title">Menu</span>
        </div>

        <a href="index.html" class="active"><span class="icon">🏠</span><span>Dashboard</span></a>
        <a href="profil.html"><span class="icon">👤</span><span>Profil</span></a>
        <a href="lapakadmin.html"><span class="icon">🎣</span><span>Lapak</span></a>
        <a href="transaksiadmin.html"><span class="icon">🧾</span><span>Transaksi</span></a>

        <div class="sidebar-bottom">
            <hr>
            <a href="#" onclick="openModal()">
                <span class="icon">🚪</span>
                <span>Logout</span>
            </a>
        </div>

    </div>

    <div class="main">

        <div class="navbar">
            <div class="left">
                <img src="logo.png" alt="Logo HookPoint">
                <span class="brand">HookPoint - Club Pemancingan</span>
            </div>

            <div class="right">
                Selamat datang, <b>Admin</b>
            </div>
        </div>

        <div class="content">

            <div class="content-header">
                <a href="tambah-lapak.html" class="btn-tambah">
                    + Tambah Data Lapak
                </a>
            </div>

            <div class="cards">
                <div class="card">
                    <h3>Total Lapak</h3>
                    <h2 id="totalLapak">5</h2>
                    <progress id="progressTotal" value="5" max="5"></progress>
                </div>

                <div class="card">
                    <h3>Lapak Available</h3>
                    <h2 id="lapakAvailable">4</h2>
                    <progress id="progressAvailable" value="4" max="5"></progress>
                </div>

                <div class="card">
                    <h3>Lapak Not Available</h3>
                    <h2 id="lapakNotAvailable">1</h2>
                    <progress id="progressNotAvailable" value="1" max="5"></progress>
                </div>
            </div>

            <div class="chart-card">
                <h3>Total Penjualan 2026</h3>
                <canvas id="chartPenjualan"></canvas>
            </div>

            <div class="chart-card">
                <h3>Total Transaksi 2026</h3>
                <canvas id="chartTransaksi"></canvas>
            </div>
        </div>

    </div>

    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <h3>Konfirmasi Logout</h3>
            <p>Apakah anda yakin ingin keluar?</p>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Batal</button>
                <button class="btn-logout" onclick="confirmLogout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("close");
        }

        function openModal() {
            document.getElementById("logoutModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("logoutModal").style.display = "none";
        }

        function confirmLogout() {
            window.location.href = "index.html";
        }

        window.onclick = function(e) {
            const modal = document.getElementById("logoutModal");
            if (e.target === modal) {
                modal.style.display = "none";
            }
        }

        /* ================= DATA PENJUALAN ================= */
        if (!localStorage.getItem("penjualan")) {
            localStorage.setItem("penjualan", JSON.stringify([
                { tanggal: "2026-01-10", total: 80000 },
                { tanggal: "2026-01-13", total: 80000 },
                { tanggal: "2026-02-12", total: 120000 },
                { tanggal: "2026-02-15", total: 120000 },
                { tanggal: "2026-03-05", total: 80000 },
                { tanggal: "2026-03-10", total: 120000 },
                { tanggal: "2026-04-01", total: 80000 },
                { tanggal: "2026-04-01", total: 80000 },
                { tanggal: "2026-04-01", total: 80000 }
            ]));
        }

        const penjualan = JSON.parse(localStorage.getItem("penjualan")) || [];

        /* ================= CHART PENJUALAN ================= */
        let penjualanBulanan = new Array(12).fill(0);

        penjualan.forEach(t => {
            if (!t.tanggal || !t.total) return;

            const date = new Date(t.tanggal);
            const year = date.getFullYear();
            const month = date.getMonth();

            if (year === 2026) {
                penjualanBulanan[month] += t.total;
            }
        });

        const canvas = document.getElementById("chartPenjualan");

        if (canvas) {
            new Chart(canvas, {
                type: "bar",
                data: {
                    labels: [
                        "Jan","Feb","Mar","Apr","Mei","Jun",
                        "Jul","Agu","Sep","Okt","Nov","Des"
                    ],
                    datasets: [{
                        label: "Total Penjualan",
                        data: penjualanBulanan,
                        backgroundColor: "#2e8b57"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        /* ================= CHART JUMLAH TRANSAKSI ================= */
        let transaksiBulanan = new Array(12).fill(0);

        penjualan.forEach(t => {
            if (!t.tanggal) return;

            const date = new Date(t.tanggal);
            const year = date.getFullYear();
            const month = date.getMonth();

            if (year === 2026) {
                transaksiBulanan[month] += 1;
            }
        });

        const canvasTransaksi = document.getElementById("chartTransaksi");

        if (canvasTransaksi) {
            new Chart(canvasTransaksi, {
                type: "bar",
                data: {
                    labels: [
                        "Jan","Feb","Mar","Apr","Mei","Jun",
                        "Jul","Agu","Sep","Okt","Nov","Des"
                    ],
                    datasets: [{
                        label: "Jumlah Transaksi",
                        data: transaksiBulanan,
                        backgroundColor: "#3498db"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        </script>

</body>
</html>
